<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Mapa - Debug</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        #map { height: 400px; width: 100%; border: 2px solid #ccc; }
        #status { background: #f0f0f0; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Prueba de Mapa - Diagnóstico</h1>
    <div id="status">Estado: Iniciando...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const statusDiv = document.getElementById('status');

        function updateStatus(message) {
            statusDiv.textContent = 'Estado: ' + message;
            console.log('Estado:', message);
        }

        try {
            updateStatus('Creando mapa...');

            // Crear mapa
            const map = L.map('map').setView([9.2, -80.5], 7);

            updateStatus('Mapa creado, cargando tiles...');

            // Agregar tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            updateStatus('Tiles agregados, creando marcador...');

            // Agregar marcador
            L.marker([9.2, -80.5]).addTo(map)
                .bindPopup('¡Mapa funcionando!')
                .openPopup();

            updateStatus('¡Mapa funcionando correctamente!');

        } catch (error) {
            updateStatus('Error: ' + error.message);
            console.error('Error completo:', error);
        }
    </script>
</body>
</html>
